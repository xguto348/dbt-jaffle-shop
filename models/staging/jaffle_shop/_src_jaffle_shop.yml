sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A clone of a Postgres application database.
    tables:
      - name: customers
        description: Raw customer data.
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
      - name: orders
        description: Raw orders data.
        columns:
          - name: id
            description: Primary Key for orders data
            data_tests:
              - unique
              - not_null